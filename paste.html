<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View Paste - ctxt</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-dark text-light">
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"
          >ctxt<span class="text-secondary">.io</span></a
        >
        <div class="navbar-nav flex-row gap-3">
          <a class="nav-link" href="index.html">New</a>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="card bg-dark border-secondary">
            <div class="card-header border-secondary">
              <div
                class="d-flex flex-wrap justify-content-between align-items-start gap-3"
              >
                <div>
                  <h5 class="mb-1" id="pasteTitle">Untitled Paste</h5>
                  <div class="d-flex flex-wrap gap-3 text-secondary small">
                    <span
                      ><i class="bi bi-clock me-1"></i
                      ><span id="pasteDate"></span
                    ></span>
                    <span
                      ><i class="bi bi-eye me-1"></i
                      ><span id="viewCount">0</span> views</span
                    >
                    <span class="badge bg-secondary" id="langBadge">text</span>
                    <span class="text-warning" id="expiresBadge"></span>
                  </div>
                </div>
                <div class="d-flex gap-2">
                  <button class="btn btn-outline-secondary btn-sm" id="rawBtn">
                    Raw
                  </button>
                  <button class="btn btn-outline-secondary btn-sm" id="copyBtn">
                    Copy
                  </button>
                  <button class="btn btn-outline-danger btn-sm" id="deleteBtn">
                    Delete
                  </button>
                </div>
              </div>
            </div>
            <div class="card-body p-0">
              <div id="pasteContent" class="paste-content"></div>
            </div>
          </div>

          <div class="text-center mt-3">
            <p class="text-secondary small">
              Share:
              <code
                class="bg-dark px-2 py-1 rounded border border-secondary"
                id="shareUrl"
              ></code>
            </p>
          </div>
        </div>
      </div>
    </div>

    <footer
      class="border-top border-secondary mt-5 py-4 text-center text-secondary"
    >
      <small>Minimalist text sharing • Built with HTML, JS & Bootstrap</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-go.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-docker.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-regex.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/paste-view.js"></script>
  </body>
</html>
